<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hotspot Identification</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Space Grotesk", sans-serif; color: #e8f0ff; background: linear-gradient(160deg, #07111f, #102845); padding: 18px; display: grid; grid-template-columns: 228px minmax(0, 1fr); gap: 14px; }
    .sidebar { position: sticky; top: 18px; height: fit-content; background: rgba(9,27,47,0.88); border: 1px solid rgba(116,168,211,0.35); border-radius: 16px; padding: 14px; backdrop-filter: blur(8px); }
    .brand { font-size: 0.95rem; font-weight: 700; margin-bottom: 10px; }
    .nav { display: grid; gap: 8px; }
    .nav a { text-decoration: none; color: #e8f0ff; border: 1px solid rgba(159,181,213,0.3); border-radius: 10px; padding: 8px 10px; font-size: 0.85rem; background: rgba(9,31,55,0.65); }
    .nav a.active { border-color: rgba(43,227,198,0.6); color: #2be3c6; }
    .content-wrap { min-width: 0; }
    .crumb { max-width: 1200px; margin: 0 auto 10px; color: #9fb5d5; font-family: "IBM Plex Mono", monospace; font-size: 0.76rem; }
    .wrap { max-width: 1200px; margin: 0 auto; }
    .top { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
    .top a { color: #2be3c6; text-decoration: none; border: 1px solid rgba(43,227,198,0.4); padding: 6px 10px; border-radius: 999px; }
    .card { background: rgba(9,27,47,0.75); border: 1px solid rgba(116,168,211,0.35); border-radius: 14px; padding: 10px; margin-top: 14px; }
    #map { height: 620px; border-radius: 12px; }
    @media (max-width: 900px) { body { grid-template-columns: 1fr; } .sidebar { position: static; } }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="brand">Crime Risk Modules</div>
    <nav class="nav">
      <a href="index.html">[CC] Command Center</a>
      <a href="temporal.html">[TM] Temporal</a>
      <a href="dashboard.html">[DB] Dashboard</a>
      <a href="forecast.html">[FC] Forecast</a>
      <a class="active" href="hotspots.html">[HS] Hotspots</a>
      <a href="evaluation.html">[EV] Evaluation</a>
    </nav>
  </aside>

  <div class="content-wrap">
  <div class="crumb">Home / Hotspot Identification</div>
  <div class="wrap">
    <div class="top">
      <h1>Hotspot Identification - Crime Hotspot Areas</h1>
      <a href="index.html">Back to Main</a>
    </div>
    <div class="card"><div id="map"></div></div>
  </div>
  </div>

  <script>
    const API_BASE = 'http://127.0.0.1:8000';
    const map = L.map('map').setView([17.385, 78.486], 11);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap contributors' }).addTo(map);

    async function init() {
      try {
        const gridResp = await fetch(`${API_BASE}/grid?grid_steps=40`);
        if (!gridResp.ok) throw new Error(await gridResp.text());
        const grid = await gridResp.json();
        const rows = (grid.rows || []).sort((a, b) => Number(b.risk_score) - Number(a.risk_score)).slice(0, 450);

        // load incidents once to allow enrichment of hotspots with crime types & times
        let incidents = [];
        try {
          const incResp = await fetch(`${API_BASE}/incidents?limit=5000`);
          if (incResp.ok) incidents = (await incResp.json()).rows || [];
        } catch (_) { incidents = []; }

        if (rows.length > 0) {
          map.setView([Number(rows[0].latitude), Number(rows[0].longitude)], 12);
        }

        // helper: haversine distance in km
        function haversine(lat1, lon1, lat2, lon2) {
          const toRad = x => x * Math.PI / 180;
          const R = 6371; // km
          const dLat = toRad(lat2 - lat1);
          const dLon = toRad(lon2 - lon1);
          const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
          return R * 2 * Math.asin(Math.sqrt(a));
        }

        // compute max risk_score for normalization
        const maxScore = Math.max(...rows.map(r => Number(r.risk_score) || 0), 1e-8);

        rows.forEach(cell => {
          const score = Number(cell.risk_score) || 0;
          const lat = Number(cell.latitude), lon = Number(cell.longitude);

          // find nearby incidents within 0.6 km
          const nearby = incidents.filter(r => {
            const rlat = Number(r.latitude), rlon = Number(r.longitude);
            if (Number.isFinite(rlat) && Number.isFinite(rlon)) {
              return haversine(lat, lon, rlat, rlon) <= 0.6;
            }
            return false;
          });

          // summarize top crime types
          const typeCounts = {};
          const hourCounts = {};
          nearby.forEach(r => {
            const t = r.crime_type || 'unknown';
            typeCounts[t] = (typeCounts[t] || 0) + 1;
            const ts = new Date(r.timestamp);
            if (!isNaN(ts)) {
              const h = ts.getHours();
              hourCounts[h] = (hourCounts[h] || 0) + 1;
            }
          });

          const topTypes = Object.entries(typeCounts).sort((a,b)=>b[1]-a[1]).slice(0,3).map(x=>`${x[0]} (${x[1]})`);
          const topHours = Object.entries(hourCounts).sort((a,b)=>b[1]-a[1]).slice(0,3).map(x=>`${x[0]}:00 (${x[1]})`);

          const popupHtml = `
            <div style="min-width:220px">
              <div><strong>Risk:</strong> ${score.toFixed(6)}</div>
              <div><strong>Nearby incidents:</strong> ${nearby.length}</div>
              <div><strong>Top crime types:</strong><br>${topTypes.join('<br>') || 'None'}</div>
              <div style="margin-top:6px"><strong>Peak hours:</strong><br>${topHours.join('<br>') || 'Unknown'}</div>
            </div>`;

          // normalize score to visual properties
          const normalized = maxScore > 0 ? Math.min(1, score / maxScore) : 0;
          const fillOpacity = 0.15 + 0.75 * normalized; // range 0.15 - 0.9
          const radiusMeters = Math.round(150 + 350 * normalized); // 150 - 500 m

          L.circle([lat, lon], {
            radius: radiusMeters,
            stroke: false,
            fillOpacity: fillOpacity,
            fillColor: '#ff3d3d'
          }).bindPopup(popupHtml).bindTooltip(`Risk: ${score.toFixed(6)}`).addTo(map);
        });

        // add legend
        const legend = L.control({position: 'bottomright'});
        legend.onAdd = function () {
          const div = L.DomUtil.create('div', 'legend card');
          div.style.padding = '8px';
          div.style.fontSize = '0.85rem';
          div.innerHTML = '<strong>Hotspot legend</strong><br/><div style="margin-top:6px">Circle opacity ∝ risk score.<br/>Click circle for nearby incident summary.</div>';
          return div;
        };
        legend.addTo(map);
      } catch (e) {
        alert(`Failed to load hotspots: ${e.message}`);
      }
    }
    init();
  </script>
</body>
</html>
